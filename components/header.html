<header class="bg-white shadow-sm sticky top-0 z-50">
  <div class="container mx-auto px-4">

    <!-- MOBILE: Logo centralizada + Menu hambúrguer -->
    <div class="md:hidden flex items-center justify-between h-16">
      <!-- Menu Hambúrguer (esquerda) -->
      <button id="menuToggleMobile" class="p-2 text-uro-azul hover:bg-gray-100 rounded-lg" aria-label="Abrir menu" aria-expanded="false">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>

      <!-- Logo CENTRALIZADA -->
      <a href="/" class="absolute left-1/2 transform -translate-x-1/2 flex items-center space-x-2">
        <svg class="w-7 h-7 text-uro-azul" viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
        </svg>
        <span class="text-base font-bold text-uro-azul whitespace-nowrap">Uroginecologia em Dia</span>
      </a>

      <!-- Ícone de busca (direita) -->
      <button class="p-2 text-uro-azul" onclick="document.getElementById('searchMobile').classList.toggle('hidden')">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
      </button>
    </div>

    <!-- Busca Mobile (dropdown) -->
    <div id="searchMobile" class="hidden md:hidden pb-3">
      <input type="search" placeholder="Buscar..." class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-uro-azul">
    </div>

    <!-- Menu Mobile (dropdown) -->
    <nav id="mobileMenuNav" class="hidden md:hidden border-t">
      <a href="/" class="block px-4 py-3 text-uro-azul hover:bg-gray-50 border-b">Página Inicial</a>
      <a href="/pages/protocolos.html" class="block px-4 py-3 text-uro-azul hover:bg-gray-50 border-b">Protocolos</a>
      <a href="/pages/artigos.html" class="block px-4 py-3 text-uro-azul hover:bg-gray-50 border-b">Artigos</a>
      <a href="/pages/eventos.html" class="block px-4 py-3 text-uro-azul hover:bg-gray-50 border-b">Eventos</a>
      <a href="/pages/noticias.html" class="block px-4 py-3 text-uro-azul hover:bg-gray-50 border-b">Notícias</a>
      <a href="/pages/sobre.html" class="block px-4 py-3 text-uro-azul hover:bg-gray-50">Sobre</a>
    </nav>

    <!-- DESKTOP: Logo centralizada + Menu horizontal -->
    <div class="hidden md:block">
      <!-- Logo CENTRALIZADA no topo -->
      <div class="flex items-center justify-center py-4 border-b">
        <a href="/" class="flex items-center space-x-3">
          <svg class="w-10 h-10 text-uro-azul" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
          </svg>
          <span class="text-2xl font-bold text-uro-azul">Uroginecologia em Dia</span>
        </a>
      </div>

      <!-- Menu horizontal + Busca -->
      <div class="flex items-center justify-between py-3">
        <nav class="flex space-x-8">
          <a href="/" class="text-uro-azul hover:text-uro-azul_claro font-medium transition-colors">Página Inicial</a>
          <a href="/pages/protocolos.html" class="text-uro-azul hover:text-uro-azul_claro font-medium transition-colors">Protocolos</a>
          <a href="/pages/artigos.html" class="text-uro-azul hover:text-uro-azul_claro font-medium transition-colors">Artigos</a>
          <a href="/pages/eventos.html" class="text-uro-azul hover:text-uro-azul_claro font-medium transition-colors">Eventos</a>
          <a href="/pages/noticias.html" class="text-uro-azul hover:text-uro-azul_claro font-medium transition-colors">Notícias</a>
          <a href="/pages/sobre.html" class="text-uro-azul hover:text-uro-azul_claro font-medium transition-colors">Sobre</a>
        </nav>

        <!-- Busca Desktop -->
        <div class="relative">
          <input type="search" placeholder="Buscar..." class="w-64 pl-10 pr-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-uro-azul text-sm">
          <svg class="absolute left-3 top-2.5 w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
          </svg>
        </div>
      </div>
    </div>

  </div>
</header>
