<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <base href="/">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <!-- PWA Configuration -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1e40af">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Google Analytics 4 -->
    <script>
      fetch('../components/analytics.html')
        .then(response => response.text())
        .then(html => {
          const temp = document.createElement('div');
          temp.innerHTML = html;
          const scripts = temp.querySelectorAll('script');
          scripts.forEach(script => {
            const newScript = document.createElement('script');
            if (script.src) newScript.src = script.src;
            else newScript.textContent = script.textContent;
            if (script.async) newScript.async = true;
            document.head.appendChild(newScript);
          });
        });
    </script>

    <!-- SEO Meta Tags -->
    <title>Resultados da Busca | Uroginecologia em Dia</title>
    <meta name="description" content="Resultados da busca no portal Uroginecologia em Dia">
    <meta name="robots" content="noindex, nofollow">

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="assets/css/style.css">

    <!-- Preconnect para CDNs -->
    <link rel="preconnect" href="https://cdn.tailwindcss.com">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js" async></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        uro: {
                            azul_escuro: '#1e40af',
                            azul: '#3b82f6',
                            azul_claro: '#60a5fa',
                            branco: '#ffffff',
                            cinza: '#f3f4f6',
                            cinza_escuro: '#6b7280'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-uro-cinza font-sans">
    <!-- Skip to main content -->
    <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 bg-uro-azul text-white px-4 py-2 rounded-lg z-50">
        Pular para conteúdo principal
    </a>

    <!-- Header carregado via componente -->
    <div id="header-component"></div>

    <!-- Main Content -->
    <main id="main-content" class="container mx-auto px-4 py-8" role="main">
        <!-- Search Header -->
        <section class="mb-12 fade-in">
            <div class="bg-gradient-to-r from-uro-azul_escuro to-uro-azul text-white rounded-2xl p-8 text-center">
                <h1 class="text-3xl md:text-4xl font-bold mb-4">Resultados da Busca</h1>
                <p id="search-query" class="text-xl"></p>
            </div>
        </section>

        <!-- Search Stats -->
        <div id="search-stats" class="mb-6 text-center">
            <p class="text-gray-600">Buscando...</p>
        </div>

        <!-- Search Results -->
        <section id="search-results" class="mb-12" aria-live="polite" aria-atomic="true">
            <!-- Os resultados serão carregados aqui -->
        </section>

        <!-- No Results Message -->
        <div id="no-results" class="hidden text-center py-12">
            <i data-feather="search" class="w-16 h-16 mx-auto mb-4 text-gray-400" aria-hidden="true"></i>
            <h2 class="text-2xl font-bold text-gray-700 mb-4">Nenhum resultado encontrado</h2>
            <p class="text-gray-600 mb-6">Tente buscar com termos diferentes ou mais genéricos.</p>
            <a href="index.html" class="inline-block bg-uro-azul hover:bg-uro-azul_escuro text-white py-3 px-6 rounded-lg font-medium transition-colors">
                Voltar para a Página Inicial
            </a>
        </div>
    </main>

    <!-- Footer carregado via componente -->
    <div id="footer-component"></div>

    <!-- Scripts -->
    <script src="assets/js/constants.min.js"></script><!-- Constantes globais -->
    <script src="assets/js/utils.min.js"></script>
    <script src="assets/js/main.min.js"></script>
    <script src="assets/js/common.min.js"></script>
    <script src="assets/js/pages/busca.min.js" defer></script>
</body>
</html>
