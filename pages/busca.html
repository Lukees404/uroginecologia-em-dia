<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <base href="/">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <!-- PWA Configuration -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#881337">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Google Analytics 4 -->
    <script>
      fetch('../components/analytics.html')
        .then(response => response.text())
        .then(html => {
          const temp = document.createElement('div');
          temp.innerHTML = html;
          const scripts = temp.querySelectorAll('script');
          scripts.forEach(script => {
            const newScript = document.createElement('script');
            if (script.src) newScript.src = script.src;
            else newScript.textContent = script.textContent;
            if (script.async) newScript.async = true;
            document.head.appendChild(newScript);
          });
        });
    </script>

    <!-- Meta Tags SEO -->
    <meta name="description" content="Resultados de busca no portal Uroginecologia em Dia.">
    <meta name="author" content="Uroginecologia em Dia">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://uroginecologiaemdia.com.br/pages/busca.html">
    <meta property="og:title" content="Resultados da Busca | Uroginecologia em Dia">
    <meta property="og:description" content="Resultados de busca no portal Uroginecologia em Dia.">

    <title>Resultados da Busca | Uroginecologia em Dia</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">

    <!-- Fonts + CSS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="assets/css/redesign.css">

</head>
<body>
    <!-- Skip to main content -->
    <a href="#main-content" class="skip-link">Pular para conteúdo principal</a>

    <!-- Header carregado via componente -->
    <div id="header-component"></div>

    <main id="main-content">
    <section class="page-hero">
        <h1 class="anim-1">Resultados da Busca</h1>
        <p id="search-query" class="anim-2"></p>
    </section>

    <section style="background: var(--creme);">
        <div class="container">
            <div id="search-stats" class="search-stat">
                <p>Buscando...</p>
            </div>

            <div id="search-results" aria-live="polite">
                <!-- Resultados carregados via JavaScript -->
            </div>

            <div id="no-results" class="empty-state hidden">
                <h3>Nenhum resultado encontrado</h3>
                <p style="margin-bottom:24px;">Tente buscar com termos diferentes ou mais genéricos.</p>
                <a href="index.html" class="btn-primary">Voltar para a Página Inicial</a>
            </div>
        </div>
    </section>
    </main>

    <!-- Footer carregado via componente -->
    <div id="footer-component"></div>

    <!-- Scripts -->
    <script src="assets/js/constants.min.js"></script>
    <script src="assets/js/utils.min.js"></script>
    <script src="assets/js/main.min.js"></script>
    <script src="assets/js/common.min.js"></script>
    <script src="assets/js/pages/busca.min.js" defer></script>
</body>
</html>
